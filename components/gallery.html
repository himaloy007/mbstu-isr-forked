<section id="gallery" class="section-wrapper delay-2 fade-in-up">
  <div class="container">
    <div class="text-center mb-5">
      <h2 class="section-title">Research Gallery</h2>
      <div class="accent-line"></div>
      <p class="section-sub">Highlights from workshops, labs, projects, and academic events</p>
    </div>

    <div class="gallery-grid" id="gallery-grid">
      <!-- Injected via JS -->
    </div>

    <div class="gallery-controls" id="gallery-controls">
      <button class="gallery-btn" id="gallery-prev" type="button" aria-label="Previous gallery page">Previous</button>
      <span class="gallery-page" id="gallery-page-indicator">Page 1 / 1</span>
      <button class="gallery-btn" id="gallery-next" type="button" aria-label="Next gallery page">Next</button>
    </div>
  </div>
</section>
